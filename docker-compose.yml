services:
  postgres:
    image: postgres:16-alpine
    container_name: olist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: olist
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/init-n8n-db.sh:/docker-entrypoint-initdb.d/00-init-n8n.sh

  n8n:
    image: n8nio/n8n
    container_name: olist_n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=olist
      - DB_POSTGRESDB_PASSWORD=olist123
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./src:/home/node/scripts
      - ./data:/home/node/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  n8n_data: